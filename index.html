      --bg2: #1e2d45;

      --yellow: #ffd166;
      --text: #ffffff;
      --text2: #c8d0e0;
      --text3: #8898b8;
      --radius: 14px;
      --radius-sm: 8px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(244,197,66,0.07) 0%, transparent 45%),

    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 4px; }

    /* ── LAYOUT ── */
    #app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    .header {

      display: flex; align-items: flex-start; justify-content: space-between;

    .header-left {}
    .header-label {

      text-transform: uppercase; margin-bottom: 6px;

    .header-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
    .header-sub { font-size: 12px; color: var(--text2); margin-top: 5px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 4px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px; margin: 0 0 20px;
      background: var(--bg2); border-radius: var(--radius);
      padding: 4px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px 8px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px;
    }
    .tab.active { background: var(--gold); color: #080b10; }
    .tab:not(.active) { background: transparent; color: var(--text2); }
    .tab:not(.active):hover { color: var(--text); }

    /* ── PLAYER PILL ── */
    .player-section { margin-bottom: 18px; }
    .section-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
    .players-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .player-pill {
      padding: 8px 18px; border-radius: 30px; border: 1.5px solid;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .player-pill.active { border-color: var(--gold); background: rgba(244,197,66,0.12); color: var(--gold); }
    .player-pill:not(.active) { border-color: var(--border2); background: transparent; color: var(--text2); }
    .player-pill:not(.active):hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

    /* ── GROUP FILTER ── */
    .group-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .group-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .group-btn.active { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); color: #fff; }
    .group-btn:not(.active) { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: #c8d0e0; }

    /* ── INFO BAR ── */
    .info-bar {
      display: flex; gap: 20px; padding: 10px 14px; margin-bottom: 18px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--text2);

    .match-card.started { border-color: rgba(244,197,66,0.2); }

    .score-inputs { display: flex; align-items: center; gap: 6px; }

      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-sm); color: #fff; outline: none;

    .score-input:focus { border-color: var(--gold); background: rgba(244,197,66,0.08); }
    .score-input:disabled { opacity: 0.35; cursor: not-allowed; }

    .locked-badge {

    .modal-overlay {

    .modal {

    .btn {

    .save-indicator { font-size: 11px; color: var(--green); letter-spacing: 1px; opacity: 0; transition: opacity 0.3s; }
    .save-indicator.visible { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

    /* ── LEGEND ── */
    .legend {
      padding: 14px 16px; background: rgba(255,255,255,0.02);
      border: 1px solid var(--border); border-radius: var(--radius-sm);

    /* ── LOADING ── */
    .loading { text-align: center; padding: 60px 20px; }
    .loading-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); margin: 0 3px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      .header-title { font-size: 22px; }
      .score-input { width: 40px; height: 40px; font-size: 16px; }
      .team-name { font-size: 12px; }
    }

let flushTimer = null;

// Schedule a render once the user stops interacting (debounced)
function scheduleFlush() {
  clearTimeout(flushTimer);
  flushTimer = setTimeout(() => {
    if (document.activeElement?.tagName !== "INPUT" && renderPending) {
      renderPending = false;
      render();
    }
  }, 3200);
}

const GROUPS_LIST = ["A","B","C","D","E","F","G","H","I","J","K","L"];

const GROUP_TEAMS = {
  A:["MEX","RSA","KOR","CZE"], B:["CAN","BIH","QAT","SUI"],
  C:["BRA","MAR","HAI","SCO"], D:["USA","PAR","AUS","TUR"],
  E:["GER","CUW","CIV","ECU"], F:["NED","JPN","SWE","TUN"],
  G:["BEL","EGY","IRN","NZL"], H:["ESP","CPV","KSA","URU"],
  I:["FRA","SEN","IRQ","NOR"], J:["ARG","AUT","ALG","JOR"],
  K:["POR","COD","COL","UZB"], L:["ENG","CRO","GHA","PAN"]
};

// Calcule le classement d'un groupe à partir des scores réels
function calcGroupStandings(group, scores) {
  const groupTeams = GROUP_TEAMS[group];
  const stats = {};
  groupTeams.forEach(t => stats[t] = {pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,played:0});

  MATCHES.filter(m => m.group === group).forEach(m => {
    const s = scores[m.id];
    if (!s || s.h === "" || s.a === "") return;
    const hg = parseInt(s.h), ag = parseInt(s.a);
    if (isNaN(hg) || isNaN(ag)) return;
    const ht = m.home, at = m.away;
    stats[ht].played++; stats[at].played++;
    stats[ht].gf+=hg; stats[ht].ga+=ag; stats[ht].gd+=hg-ag;
    stats[at].gf+=ag; stats[at].ga+=hg; stats[at].gd+=ag-hg;
    if(hg>ag){stats[ht].pts+=3;stats[ht].w++;stats[at].l++;}
    else if(hg<ag){stats[at].pts+=3;stats[at].w++;stats[ht].l++;}
    else{stats[ht].pts+=1;stats[ht].d++;stats[at].pts+=1;stats[at].d++;}
  });

  return groupTeams
    .map(t => ({team:t,...stats[t]}))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || b.w-a.w);
}

function getBestThirds(scores) {
  return GROUPS_LIST
    .map(g => { const s=calcGroupStandings(g,scores); return s[2]?{...s[2],group:g}:null; })
    .filter(Boolean)
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || b.w-a.w)
    .slice(0,8);
}

// Détermine le vainqueur d'un match KO.
// Priorité : score réel (koActuals) > pronostic du joueur (koScores)
function getKoWinnerFixed(matchId, koScores) {
  // Try real score first
  const actual = state.koActuals[matchId];
  const src = (actual && actual.h !== "" && actual.a !== "") ? actual : koScores[matchId];
  if (!src || src.h === "" || src.a === "") return null;
  const h = parseInt(src.h), a = parseInt(src.a);
  if (isNaN(h) || isNaN(a)) return null;
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  const match = allKo.find(m => m.id === matchId);
  if (!match) return null;
  const homeTeam = resolveKoTeam(match, "home", koScores);
  const awayTeam = resolveKoTeam(match, "away", koScores);
  if (h === a) {
    if (src.pen === "home") return homeTeam;
    if (src.pen === "away") return awayTeam;
    return null;
  }
  return h > a ? homeTeam : awayTeam;
}

function getKoLoserFixed(matchId, koScores) {
  const actual = state.koActuals[matchId];
  const src = (actual && actual.h !== "" && actual.a !== "") ? actual : koScores[matchId];
  if (!src || src.h === "" || src.a === "") return null;
  const h = parseInt(src.h), a = parseInt(src.a);
  if (isNaN(h) || isNaN(a)) return null;
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  const match = allKo.find(m => m.id === matchId);
  if (!match) return null;
  const homeTeam = resolveKoTeam(match, "home", koScores);
  const awayTeam = resolveKoTeam(match, "away", koScores);
  if (h === a) {
    if (src.pen === "home") return awayTeam;
    if (src.pen === "away") return homeTeam;
    return null;
  }
  return h > a ? awayTeam : homeTeam;
}

// Résout l'équipe home/away d'un match KO
function resolveKoTeam(match, side, koScores) {
  if (match.home && match.away) {
    return match[side];
  }
  if (match.from) {
    const sourceId = match.from[side === "home" ? 0 : 1];
    if (match.loser) return getKoLoserFixed(sourceId, koScores);
    return getKoWinnerFixed(sourceId, koScores);
  }
  return null;
}

// Construit un tour avec les équipes résolues (pour affichage)
function resolveKoRound(roundMatches, koScores) {
  return roundMatches.map(m => ({
    ...m,
    home: resolveKoTeam(m, "home", koScores),
    away: resolveKoTeam(m, "away", koScores),
  }));
}

function buildFullBracket(koScores) {
  return {
    r32: resolveKoRound(KO_MATCHES.r32, koScores),
    r16: resolveKoRound(KO_MATCHES.r16, koScores),
    qf: resolveKoRound(KO_MATCHES.qf, koScores),
    sf: resolveKoRound(KO_MATCHES.sf, koScores),
    third: resolveKoRound(KO_MATCHES.third, koScores),
    final: resolveKoRound(KO_MATCHES.final, koScores),
  };
}

const ADMIN_PASS = "coupe2026";


function getResult(h, a) {
  if (h===""||a===""||h===null||a===null) return null;
  const hi=parseInt(h),ai=parseInt(a);
  if(isNaN(hi)||isNaN(ai)) return null;
  return hi>ai?"H":hi<ai?"A":"D";
}
function calcPoints(pred, actual) {
  if(!pred||!actual||pred.h===""||pred.a===""||actual.h===""||actual.a==="") return null;
  if(pred.h===undefined||actual.h===undefined) return null;
  const pr=getResult(pred.h,pred.a), ar=getResult(actual.h,actual.a);
  if(pr===null||ar===null) return null;
  if(String(pred.h)===String(actual.h)&&String(pred.a)===String(actual.a)) return 3;
  if(pr===ar) return 1;
  return 0;
}
function isStarted(match) {
  const now=new Date();
  const d=new Date(`${match.date}T${match.time}:00Z`);
  return now>=d;
}
function teamName(code, lang) {
  const t=TEAMS[code];
  if(!t) return code;
  return lang==="en" ? t.en : t.name;
}
function fmt(date) {
  return new Date(date+"T00:00:00Z").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",timeZone:"UTC"});
}
function fmtLocalTime(date, time) {
  return new Date(date+"T"+time+":00Z").toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Brussels"});
}
function fmtLocalDate(date, time) {
  return new Date(date+"T"+time+":00Z").toLocaleDateString("fr-BE",{weekday:"long",day:"numeric",month:"long",timeZone:"Europe/Brussels"});
}

// ══════════════════════════════════════════════════════════
// FIREBASE
// ══════════════════════════════════════════════════════════
function initFirebase() {
  db = window.__db;
  dbRef = window.__dbRef;
  dbSet = window.__dbSet;
  dbGet = window.__dbGet;
  dbOnValue = window.__dbOnValue;
  dbUpdate = window.__dbUpdate;

  // Listen to all data
  dbOnValue(dbRef(db, "/"), snap => {
    const data = snap.val() || {};
    state.players = data.players || {};
    state.actuals = data.actuals || {};
    state.koPredictions = data.koPredictions || {};
    state.koActuals = data.koActuals || {};
    // Always load predictions — first load takes everything, subsequent only merge others
    const _incoming = data.predictions || {};
    const wasLoaded = state._predictionsLoaded;
    if (!state._predictionsLoaded) {
      state.predictions = _incoming;
      state._predictionsLoaded = true;
    } else if (state.tab !== "pronostics") {
      state.predictions = _incoming;
    } else {
      Object.keys(_incoming).forEach(pid => {
        if (pid !== state.player) state.predictions[pid] = _incoming[pid];
      });
    }
    // Render immediately on first load. Afterwards, NEVER render while the
    // user is actively interacting (typing, just focused/blurred an input) —
    // wait for the interaction window to pass, or for a tab switch to flush it.
    if (!wasLoaded) {
      render();
    } else if (Date.now() - lastInteraction < 3000 || document.activeElement?.tagName === "INPUT") {
      renderPending = true;
      scheduleFlush();
    } else {
      render();
    }
  });

  // Initial render after Firebase connected
  render();
}

// Get the real R32 bracket from actual scores
// Map of which matches feed into which next round
// Trouve tous les matchs dont les équipes dépendent (directement) du résultat de matchId
function findDownstreamKoIds(matchId) {
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  return allKo.filter(m => m.from && m.from.includes(matchId)).map(m => m.id);
}

async function resetDownstreamKO(matchId) {
  const players = Object.keys(state.players);
  for (const playerId of players) {
    await resetDownstreamKOForPlayer(playerId, matchId);
  }
}

async function resetDownstreamKOForPlayer(playerId, matchId) {
  const nexts = findDownstreamKoIds(matchId);
  for (const next of nexts) {
    await dbSet(dbRef(db, `koPredictions/${playerId}/${next}`), null);
    await resetDownstreamKOForPlayer(playerId, next);
  }
}

// ── AUTH ─────────────────────────────────────────────────
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + "wc2026salt");
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function registerPlayer(name, password, lang) {
  const trimName = name.trim();
  if (!trimName || !password) return;
  // Check duplicate name
  const existing = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (existing) {
    state.loginError = lang === "en"
      ? `"${trimName}" is already taken. Choose another name or log in.`
      : `"${trimName}" est déjà pris. Choisis un autre prénom ou connecte-toi.`;
    render(); bindLoginModal(); return;
  }
  const hash = await hashPassword(password);
  const id = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  await dbSet(dbRef(db, `players/${id}`), {name: trimName, lang, hash});
  state.player = id;
  state.lang = lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function loginPlayer(name, password, lang) {
  const trimName = name.trim();
  const found = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (!found) {
    state.loginError = lang === "en" ? "Name not found. Check spelling or sign up." : "Prénom introuvable. Vérifie l'orthographe ou inscris-toi.";
    render(); bindLoginModal(); return;
  }
  const [id, p] = found;
  const hash = await hashPassword(password);
  if (hash !== p.hash) {
    state.loginError = lang === "en" ? "Wrong password." : "Mot de passe incorrect.";
    render(); bindLoginModal(); return;
  }
  state.player = id;
  state.lang = p.lang || lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", state.lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function deletePlayer(id) {
  await dbSet(dbRef(db, `players/${id}`), null);
  await dbSet(dbRef(db, `predictions/${id}`), null);
  render();
}

function calcGroupPoints(id) {
  let total=0, exact=0, correct=0, played=0;
  MATCHES.forEach(m => {
    const pred = (state.predictions[id]||{})[m.id];
    const actual = state.actuals[m.id];
    const pts = calcPoints(pred, actual);
    if (pts !== null) { total+=pts; played++; if(pts===3)exact++; if(pts>=1)correct++; }
  });
  return {total, exact, correct, played};
}

function calcKoPoints(id) {
  let total=0, exact=0, correct=0, played=0;
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  allKo.forEach(m => {
    const pred = (state.koPredictions?.[id]||{})[m.id];
    const actual = state.koActuals[m.id];
    const pts = calcPoints(pred, actual);
    if (pts !== null) { total+=pts; played++; if(pts===3)exact++; if(pts>=1)correct++; }
  });
  return {total, exact, correct, played};
}

function renderClassement(playerList, L) {
  const mode = state.classementMode || "total";

    const a = state.actuals[m.id];

  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];

    const a = state.koActuals[m.id];
    return a && a.h !== "" && a.a !== "";

  const scores = playerList.map(([id, p]) => {
    const g = calcGroupPoints(id);
    const k = calcKoPoints(id);
    let total, exact, correct;
    if (mode === "groups") { total=g.total; exact=g.exact; correct=g.correct; }
    else if (mode === "knockout") { total=k.total; exact=k.exact; correct=k.correct; }
    else { total=g.total+k.total; exact=g.exact+k.exact; correct=g.correct+k.correct; }

function bindLoginModal() {
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.lang = btn.dataset.lang; render(); bindLoginModal(); });
  });
  const nameInput = document.getElementById("login-name");
  const passInput = document.getElementById("login-password");
  const submit = document.getElementById("login-submit");

  const go = () => {
    const name = nameInput?.value.trim();
    const pass = passInput?.value;
    if (!name) { nameInput?.focus(); return; }
    if (!pass) { passInput?.focus(); return; }
    if (state.loginMode === "login") {
      loginPlayer(name, pass, state.lang);
    } else {
      registerPlayer(name, pass, state.lang);
    }
  };

  submit?.addEventListener("click", go);
  passInput?.addEventListener("keydown", e => { if (e.key==="Enter") go(); });
  nameInput?.addEventListener("keydown", e => { if (e.key==="Enter") passInput?.focus(); });
  nameInput?.focus();
}


function renderKoMatch(match, pred, L, isAdmin, koActual, playerList, allKoPreds) {
  const home = match.home;
  const away = match.away;
  const homeTeam = home ? TEAMS[home] : null;
  const awayTeam = away ? TEAMS[away] : null;

  const homeName = homeTeam ? (L ? homeTeam.en : homeTeam.name) : tbd;
  const awayName = awayTeam ? (L ? awayTeam.en : awayTeam.name) : tbd;
  const homeFlag = homeTeam ? homeTeam.flag : "❓";
  const awayFlag = awayTeam ? awayTeam.flag : "❓";
  const koStarted = match.date && match.time ? isStarted(match) : false;
  const canPredict = home && away && !koStarted;
  const hasActual = koActual && koActual.h !== "" && koActual.a !== "";

      <span style="color:var(--text3);font-size:13px">—</span>
      <input type="number" min="0" max="20" value="${pred?.a||""}" ${!canPredict?"disabled":""}

        style="width:38px;height:38px;text-align:center;font-size:15px;font-weight:700;font-family:'DM Mono',monospace;background:${canPredict?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)"};border:1.5px solid ${canPredict?"var(--border2)":"rgba(255,255,255,0.06)"};border-radius:7px;color:${canPredict?"#fff":"var(--text3)"};outline:none" />
      ${canPredict ? `<button class="validate-ko-btn" data-validate-ko="${match.id}" style="width:30px;height:38px;border:none;border-radius:7px;background:rgba(244,197,66,0.15);color:var(--gold);font-size:14px;cursor:pointer;flex-shrink:0">✓</button>` : ""}
      <span style="flex:1;font-size:12px;font-weight:700;color:${away?"var(--text)":"var(--text3)"};text-align:right">${awayName}</span>
      <span style="font-size:16px">${awayFlag}</span>

          <button class="pen-actual-btn" data-pen-actual="${match.id}" data-side="home" style="flex:1;padding:5px 8px;border-radius:6px;border:1.5px solid ${koActual?.pen==="home"?"var(--green)":"var(--border2)"};background:${koActual?.pen==="home"?"rgba(0,229,160,0.15)":"transparent"};color:${koActual?.pen==="home"?"var(--green)":"var(--text2)"};font-size:11px;font-weight:600;cursor:pointer">${homeName}</button>

}

// Affiche les autres joueurs : ✓ vert avant le match, score réel après
function renderOthersRow(matchId, started, hasActual, actual, playerList, allKoPreds, L) {
  const others = playerList.filter(([id]) => id !== state.player);
  if (others.length === 0) return "";

  const rows = others.map(([id, p]) => {
    const pred = (allKoPreds[id] || {})[matchId];
    const hasPred = pred && pred.h !== "" && pred.a !== "" && pred.h !== undefined;
    if (!hasPred) return "";

    if (!started) {
      // Avant le coup d'envoi : juste un ✓ vert, pas de score visible
      return `<span style="font-size:10px;color:var(--text3);background:var(--bg3);border-radius:6px;padding:2px 7px">${p.name} <span style="color:var(--green)">✓</span></span>`;
    } else {
      // Après le coup d'envoi : score du joueur
      const penLabel = pred.pen ? ` <span style="color:var(--text3)">(t.a.b.)</span>` : "";
      return `<span style="font-size:10px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:2px 7px">${p.name} ${pred.h}–${pred.a}${penLabel}</span>`;
    }
  }).filter(Boolean);

  if (rows.length === 0) return "";

  return `<div style="display:flex;flex-wrap:wrap;gap:5px;padding-top:7px;margin-top:7px;border-top:1px solid var(--border)">${rows.join("")}</div>`;
}

function renderRound(matches, playerKoPreds, koActuals, L, isAdmin, title, playerList, allKoPreds) {
  return `
    <div style="margin-bottom:20px">
      <div style="font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(244,197,66,0.2)">${title}</div>
      ${matches.map(m => {
        const pred = (playerKoPreds||{})[m.id] || {h:"",a:""};
        const koActual = (koActuals||{})[m.id] || {h:"",a:""};
        return renderKoMatch(m, pred, L, isAdmin, koActual, playerList, allKoPreds);
      }).join("")}
    </div>`;
}

function renderKnockout(L) {
  // Le bracket utilise les PRONOSTICS du joueur (transmis sur les vrais matchs fixes)
  const playerKoPreds = (state.koPredictions?.[state.player] || {});
  const koActuals = state.koActuals || {};

  const bracket = buildFullBracket(playerKoPreds);
  const {r32, r16, qf, sf, third, final} = bracket;

  const predCount = KO_MATCHES.r32.filter(m => {
    const p = playerKoPreds[m.id];
    return p && p.h !== "" && p.a !== "";
  }).length;

  const playerList = Object.entries(state.players);
  const allKoPreds = state.koPredictions || {};

  return `
    <div style="margin-bottom:16px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text2)">
      💡 ${L
        ? "Predict the real knockout matches. Winners advance automatically as you go!"
        : "Pronostique les vrais matchs à élimination. Les vainqueurs avancent automatiquement au fil de tes pronostics !"}
      <div style="margin-top:4px;font-size:11px;color:var(--text3)">${predCount} / 16 ${L?"Round of 32 matches predicted":"matchs des 1/16 pronostiqués"}</div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.6">
        ${L ? `
          ⚽ <strong style="color:var(--text2)">Score</strong> = final score incl. extra time (e.g. 2-1 after extra time → enter 2-1)<br>
          🥅 <strong style="color:var(--text2)">Draw after extra time?</strong> A penalty shootout selector will appear — pick the winner<br>
          🏆 <strong style="color:var(--text2)">Scoring</strong> = same as group stage: exact score 3 pts, correct winner 1 pt
        ` : `
          ⚽ <strong style="color:var(--text2)">Score</strong> = score final, prolongations incluses (ex : 2-1 après prolongations → entre 2-1)<br>
          🥅 <strong style="color:var(--text2)">Match nul après prolongations ?</strong> Un sélecteur de tirs au but apparaît — choisis le vainqueur<br>
          🏆 <strong style="color:var(--text2)">Points</strong> = comme en phase de groupes : score exact 3 pts, bon vainqueur 1 pt
        `}
      </div>
    </div>

    ${renderRound(r32, playerKoPreds, koActuals, L, state.isAdmin, L?"Round of 32 — 1/16":"1/16 de finale", playerList, allKoPreds)}
    ${renderRound(r16, playerKoPreds, koActuals, L, state.isAdmin, L?"Round of 16 — 1/8":"1/8 de finale", playerList, allKoPreds)}
    ${renderRound(qf,  playerKoPreds, koActuals, L, state.isAdmin, L?"Quarter-finals":"1/4 de finale", playerList, allKoPreds)}
    ${renderRound(sf,  playerKoPreds, koActuals, L, state.isAdmin, L?"Semi-finals":"Demi-finales", playerList, allKoPreds)}
    ${renderRound(third, playerKoPreds, koActuals, L, state.isAdmin, L?"🥉 3rd place":"🥉 Match pour la 3e place", playerList, allKoPreds)}
    ${renderRound(final, playerKoPreds, koActuals, L, state.isAdmin, L?"🏆 Final":"🏆 Finale", playerList, allKoPreds)}
  `;
}

// ── AUTH ─────────────────────────────────────────────────
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + "wc2026salt");
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function registerPlayer(name, password, lang) {
  const trimName = name.trim();
  if (!trimName || !password) return;
  // Check duplicate name
  const existing = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (existing) {
    state.loginError = lang === "en"
      ? `"${trimName}" is already taken. Choose another name or log in.`
      : `"${trimName}" est déjà pris. Choisis un autre prénom ou connecte-toi.`;
    render(); bindLoginModal(); return;
  }
  const hash = await hashPassword(password);
  const id = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  await dbSet(dbRef(db, `players/${id}`), {name: trimName, lang, hash});
  state.player = id;
  state.lang = lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function loginPlayer(name, password, lang) {
  const trimName = name.trim();
  const found = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (!found) {
    state.loginError = lang === "en" ? "Name not found. Check spelling or sign up." : "Prénom introuvable. Vérifie l'orthographe ou inscris-toi.";
    render(); bindLoginModal(); return;
  }
  const [id, p] = found;
  const hash = await hashPassword(password);
  if (hash !== p.hash) {
    state.loginError = lang === "en" ? "Wrong password." : "Mot de passe incorrect.";
    render(); bindLoginModal(); return;
  }
  state.player = id;
  state.lang = p.lang || lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", state.lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function deletePlayer(id) {
  await dbSet(dbRef(db, `players/${id}`), null);
  await dbSet(dbRef(db, `predictions/${id}`), null);
  render();
}

function flashBtn(btn) {
  btn.textContent = "✓";
  btn.style.background = "rgba(0,229,160,0.3)";
  btn.style.color = "var(--green)";
  setTimeout(() => {
    btn.style.background = "rgba(244,197,66,0.15)";
    btn.style.color = "var(--gold)";
  }, 1000);
}

function flashSave() {
  state.saveIndicator = true;
  render();
  setTimeout(() => { state.saveIndicator = false; render(); }, 1800);
}

// RENDER
// ══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  const L = state.lang === "en";

  // Show login if needed
  if (state.showLoginModal) {
    app.innerHTML = renderLoginModal();
    bindLoginModal();
    return;
  }

  // If Firebase not yet loaded, show loading screen
  if (!state._predictionsLoaded) {
    app.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px"><div style="font-size:48px">⚽</div><div style="color:#f4c542;font-size:14px">Connexion...</div></div>';
    return;
  }

  // If saved player not found in Firebase, show login
  if (state.player && !state.players[state.player]) {
    state.player = null;
    state.showLoginModal = true;
    app.innerHTML = renderLoginModal();
    bindLoginModal();
    return;
  }

  const myPlayer = state.players[state.player];
  const groups = ["ALL","A","B","C","D","E","F","G","H","I","J","K","L"];

function renderMatchCard(m, playerList, L) {

        return `<span class="other-pred"><span class="name">${p.name}</span>${pred.h}–${pred.a}</span>`;

function calcGroupPoints(id) {
  let total=0, exact=0, correct=0, played=0;
  MATCHES.forEach(m => {
    const pred = (state.predictions[id]||{})[m.id];
    const actual = state.actuals[m.id];
    const pts = calcPoints(pred, actual);
    if (pts !== null) { total+=pts; played++; if(pts===3)exact++; if(pts>=1)correct++; }
  });
  return {total, exact, correct, played};
}

function calcKoPoints(id) {
  let total=0, exact=0, correct=0, played=0;
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  allKo.forEach(m => {
    const pred = (state.koPredictions?.[id]||{})[m.id];
    const actual = state.koActuals[m.id];
    const pts = calcPoints(pred, actual);
    if (pts !== null) { total+=pts; played++; if(pts===3)exact++; if(pts>=1)correct++; }
  });
  return {total, exact, correct, played};
}

function renderClassement(playerList, L) {
  const mode = state.classementMode || "total";

  const played = MATCHES.filter(m => {
    const a = state.actuals[m.id];
    return a && a.h !== "" && a.a !== "";
  }).length;
  const allKo = [...KO_MATCHES.r32, ...KO_MATCHES.r16, ...KO_MATCHES.qf, ...KO_MATCHES.sf, ...KO_MATCHES.third, ...KO_MATCHES.final];
  const koPlayed = allKo.filter(m => {
    const a = state.koActuals[m.id];
    return a && a.h !== "" && a.a !== "";
  }).length;

  const scores = playerList.map(([id, p]) => {
    const g = calcGroupPoints(id);
    const k = calcKoPoints(id);
    let total, exact, correct;
    if (mode === "groups") { total=g.total; exact=g.exact; correct=g.correct; }
    else if (mode === "knockout") { total=k.total; exact=k.exact; correct=k.correct; }
    else { total=g.total+k.total; exact=g.exact+k.exact; correct=g.correct+k.correct; }
    return {id, name:p.name, total, exact, correct};
  }).sort((a,b) => b.total-a.total || b.exact-a.exact);

  const tabs = [
    {key:"knockout", label: L?"Knockout":"Phases finales"},
    {key:"groups", label: L?"Groups":"Groupes"},
    {key:"total", label: L?"Total":"Total"},
  ];

  return `
    <div style="display:flex;gap:4px;margin-bottom:14px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px">
      ${tabs.map(t => `
        <button class="classement-mode-btn" data-mode="${t.key}" style="flex:1;padding:8px 4px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:${mode===t.key?"var(--gold)":"transparent"};color:${mode===t.key?"#080b10":"var(--text2)"}">
          ${t.label}
        </button>
      `).join("")}
    </div>

    <div style="margin-bottom:14px;font-size:12px;color:var(--text2)">
      ${mode==="groups" ? `${played} / ${MATCHES.length} ${L?"group matches played":"matchs de groupe joués"}` :
        mode==="knockout" ? `${koPlayed} / ${allKo.length} ${L?"knockout matches played":"matchs à élimination joués"} · 💡 ${L?"Fresh leaderboard — anyone can join now!":"Classement repart à zéro — tout le monde peut rejoindre maintenant !"}` :
        `${played+koPlayed} / ${MATCHES.length+allKo.length} ${L?"matches played":"matchs joués"}`}
      · ${playerList.length} ${L?"players":"joueurs"}
    </div>
    ${scores.length === 0 ? `<div class="empty">Aucun joueur inscrit</div>` : scores.map((s, i) => `
      <div class="lb-item ${i===0?"first":""}">
        <span class="lb-rank">${i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`}</span>
        <div class="lb-name">
          ${s.name}
          ${s.id===state.player?`<span style="font-size:10px;color:var(--text3);margin-left:6px">(${L?"you":"toi"})</span>`:""}
        </div>
        <div class="lb-stats">
          <span title="${L?"Exact scores":"Scores exacts"}">🎯 ${s.exact}</span>
          <span title="${L?"Correct results":"Bons résultats"}">✓ ${s.correct}</span>
        </div>
        <span class="lb-total ${i===0?"first":""}">${s.total}</span>
      </div>
    `).join("")}

    <div style="margin-top:24px;padding:14px 16px;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius-sm)">
      <div style="font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">${L?"Legend":"Légende"}</div>

      </div>

  `;
}

function bindLoginModal() {
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.lang = btn.dataset.lang; render(); bindLoginModal(); });
  });
  const nameInput = document.getElementById("login-name");
  const passInput = document.getElementById("login-password");
  const submit = document.getElementById("login-submit");

  const go = () => {
    const name = nameInput?.value.trim();
    const pass = passInput?.value;
    if (!name) { nameInput?.focus(); return; }
    if (!pass) { passInput?.focus(); return; }
    if (state.loginMode === "login") {
      loginPlayer(name, pass, state.lang);
    } else {
      registerPlayer(name, pass, state.lang);
    }
  };

  submit?.addEventListener("click", go);
  passInput?.addEventListener("keydown", e => { if (e.key==="Enter") go(); });
  nameInput?.addEventListener("keydown", e => { if (e.key==="Enter") passInput?.focus(); });
  nameInput?.focus();
}


function renderGroupes(L) {
  const allThirds = [];

  const groupBlocks = GROUPS_LIST.map(g => {
    const standings = calcGroupStandings(g, state.actuals);
    const groupMatches = MATCHES.filter(m => m.group === g);
    const playedCount = groupMatches.filter(m => {
      const a = state.actuals[m.id];
      return a && a.h !== "" && a.a !== "";
    }).length;
    const total = groupMatches.length;
    const complete = playedCount === total;

    if (standings[2]) allThirds.push({...standings[2], group: g, complete});

    return {g, standings, playedCount, total, complete};
  });

  // Best 8 thirds
  const best8 = [...allThirds]
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || b.w-a.w)
    .slice(0, 8);
  const best8ids = new Set(best8.map(t => t.group + t.team));

  const renderStanding = (entry, rank, g, complete) => {
    const team = TEAMS[entry.team];
    const isQ = rank <= 2 && complete;
    const is3rd = rank === 3;
    const inBest8 = best8ids.has(g + entry.team);
    const isElim = complete && rank > 2 && !inBest8;
    const isQ3 = is3rd && inBest8 && complete;

    let bg = "transparent";
    let borderLeft = "3px solid transparent";
    if (isQ) borderLeft = "3px solid var(--green)";
    else if (isQ3) borderLeft = "3px solid #ffd166";
    else if (isElim) borderLeft = "3px solid var(--red)";

    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${bg};border-left:${borderLeft};margin-left:-10px;padding-left:7px">
      <span style="font-size:12px;color:var(--text3);width:14px">${rank}</span>
      <span style="font-size:16px">${team?.flag||"🏳️"}</span>
      <span style="flex:1;font-size:12px;font-weight:${isQ||isQ3?"700":"500"};color:${isElim?"var(--text3)":"var(--text)"}">${L?team?.en:team?.name}</span>
      <span style="font-size:11px;font-weight:700;color:var(--text2);width:20px;text-align:center">${entry.pts}</span>
      <span style="font-size:10px;color:var(--text3);width:16px;text-align:center">${entry.played}</span>
      <span style="font-size:10px;color:var(--text3);width:24px;text-align:center">${entry.gd>0?"+":""}${entry.gd}</span>
      <span style="font-size:10px;color:var(--text3);width:20px;text-align:center">${entry.gf}</span>
    </div>`;
  };

  const groupsHtml = groupBlocks.map(({g, standings, playedCount, total, complete}) => `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;font-weight:800;color:var(--gold);letter-spacing:2px">${L?"GROUP":"GROUPE"} ${g}</span>
        <span style="font-size:10px;color:var(--text3)">${playedCount}/${total} ${L?"played":"joués"}</span>
      </div>
      <div style="display:flex;gap:4px;font-size:9px;color:var(--text3);padding:0 10px 4px 31px;letter-spacing:1px">
        <span style="flex:1"></span>
        <span style="width:20px;text-align:center">Pts</span>
        <span style="width:16px;text-align:center">J</span>
        <span style="width:24px;text-align:center">Diff</span>
        <span style="width:20px;text-align:center">Bp</span>
      </div>
      ${standings.map((e,i) => renderStanding(e, i+1, g, complete)).join("")}
    </div>
  `).join("");

  // Best 8 thirds section
  const thirdsHtml = `
    <div style="background:var(--bg2);border:1px solid rgba(255,209,102,0.3);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;color:#ffd166;letter-spacing:2px;margin-bottom:8px">
        🏅 ${L?"BEST 8 THIRD-PLACE TEAMS":"8 MEILLEURS 3ÈMES"}
      </div>
      ${best8.length === 0 ? `<div style="color:var(--text3);font-size:12px">${L?"No matches played yet":"Aucun match joué"}</div>` :
        best8.map((e, i) => {
          const team = TEAMS[e.team];
          return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:12px;color:var(--text3);width:16px">${i+1}</span>
            <span style="font-size:15px">${team?.flag||"🏳️"}</span>
            <span style="flex:1;font-size:12px;font-weight:600">${L?team?.en:team?.name}</span>
            <span style="font-size:10px;color:var(--text3)">Gr. ${e.group}</span>
            <span style="font-size:11px;font-weight:700;color:#ffd166">${e.pts} pts</span>
            <span style="font-size:10px;color:var(--text3)">${e.gd>0?"+":""}${e.gd} / ${e.gf}bp</span>
          </div>`;
        }).join("")
      }
    </div>
  `;

  // Legend
  const legend = `
    <div style="display:flex;gap:16px;font-size:11px;color:var(--text2);padding:8px 0;flex-wrap:wrap">
      <span><span style="color:var(--green)">▌</span> ${L?"Qualified (1st/2nd)":"Qualifié (1er/2e)"}</span>
      <span><span style="color:#ffd166">▌</span> ${L?"Best 3rd":"Meilleur 3e"}</span>
      <span><span style="color:var(--red)">▌</span> ${L?"Eliminated":"Éliminé"}</span>
    </div>
  `;

  // Real bracket — scores réels saisis en admin (mêmes matchs que l'onglet Phases)
  const realBracket = buildFullBracket(state.koActuals);

  const renderRealMatch = (m, i) => {
    const home = m.home ? TEAMS[m.home] : null;
    const away = m.away ? TEAMS[m.away] : null;
    const tbd = `<span style="color:var(--text3);font-style:italic">${L?"TBD":"À déterm."}</span>`;
    const actual = state.koActuals[m.id];
    const hasResult = actual && actual.h !== "" && actual.a !== "";

    return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:10px;color:var(--text3);width:24px">M${m.matchNum||i+1}</span>
      <span style="font-size:14px">${home?.flag||"❓"}</span>
      <span style="flex:1;font-size:12px;font-weight:${home?"600":"400"};color:${home?"var(--text)":"var(--text3)"}">
        ${home?(L?home.en:home.name):tbd}
      </span>
      ${hasResult ? `<span style="font-size:12px;font-weight:800;color:var(--gold);font-family:'DM Mono',monospace">${actual.h}–${actual.a}${actual.pen?` <span style="font-size:9px;color:var(--text3)">(t.a.b.)</span>`:""}</span>` : `<span style="font-size:10px;color:var(--text3)">vs</span>`}
      <span style="flex:1;font-size:12px;font-weight:${away?"600":"400"};color:${away?"var(--text)":"var(--text3)"};text-align:right">
        ${away?(L?away.en:away.name):tbd}
      </span>
      <span style="font-size:14px">${away?.flag||"❓"}</span>
    </div>`;
  };

  const renderRealRound = (matches, title) => matches.length === 0 ? "" : `
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${title}</div>
      ${matches.map(renderRealMatch).join("")}
    </div>
  `;

  const realBracketHtml = `
    <div style="background:var(--bg2);border:1px solid rgba(0,229,160,0.3);border-radius:12px;padding:12px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:2px;margin-bottom:10px">
        ⚔️ ${L?"REAL BRACKET":"BRACKET RÉEL"}
      </div>
      ${renderRealRound(realBracket.r32, L?"Round of 32":"1/16 de finale")}
      ${renderRealRound(realBracket.r16, L?"Round of 16":"1/8 de finale")}
      ${renderRealRound(realBracket.qf, L?"Quarter-finals":"1/4 de finale")}
      ${renderRealRound(realBracket.sf, L?"Semi-finals":"Demi-finales")}
      ${renderRealRound(realBracket.third, L?"🥉 3rd place":"🥉 3e place")}
      ${renderRealRound(realBracket.final, L?"🏆 Final":"🏆 Finale")}
    </div>
  `;

  return legend + realBracketHtml + thirdsHtml + groupsHtml;
}

function bindEvents(groups, filteredMatches, playerList, L) {
  // Classement mode toggle
  document.querySelectorAll(".classement-mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.classementMode = btn.dataset.mode;
      render();
    });
  });

  // Tabs — flush pending Firebase data on tab switch
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      state.tab = btn.dataset.tab;
      renderPending = false;
      render();
    });
  });

  // Group filter
  document.querySelectorAll(".group-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.group = btn.dataset.group; render(); });
  });

  // Prediction inputs — only update local state, save on validate button
  const debounceTimers = {};
  document.querySelectorAll(".score-input[data-match]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = input.dataset.match + input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("blur", () => { activeInputId = null; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.match;
      const side = input.dataset.side;
      if (!state.predictions[state.player]) state.predictions[state.player] = {};
      if (!state.predictions[state.player][matchId]) state.predictions[state.player][matchId] = {h:"",a:""};
      state.predictions[state.player][matchId][side] = input.value;
    });
    // Also save on Enter key
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const matchId = input.dataset.match;
        const pred = (state.predictions[state.player]||{})[matchId] || {h:"",a:""};
        savePrediction(matchId, pred.h, pred.a);
        input.blur();
        // Flash the validate button
        const btn = document.querySelector(`[data-validate="${matchId}"]`);
        if (btn) { btn.textContent = "✓"; btn.style.background = "rgba(0,229,160,0.3)"; setTimeout(() => { btn.style.background = "rgba(244,197,66,0.15)"; }, 800); }
      }
    });
  });

  // Validate buttons — group match predictions
  document.querySelectorAll(".validate-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validate;
      const pred = (state.predictions[state.player]||{})[matchId] || {h:"",a:""};
      savePrediction(matchId, pred.h, pred.a);
      flashBtn(btn);
    });
  });

  // Validate buttons — admin actual scores (group matches)
  document.querySelectorAll(".validate-actual-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateActual;
      const actual = state.actuals[matchId] || {h:"",a:""};
      saveActual(matchId, actual.h, actual.a);
      flashBtn(btn);
    });
  });

  // Penalty winner selector — predictions
  document.querySelectorAll(".pen-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.pen;
      const side = btn.dataset.side;
      if (!state.koPredictions[state.player]) state.koPredictions[state.player] = {};
      if (!state.koPredictions[state.player][matchId]) state.koPredictions[state.player][matchId] = {h:"",a:""};
      state.koPredictions[state.player][matchId].pen = side;
      const pred = state.koPredictions[state.player][matchId];
      saveKoPredictionWithPen(matchId, pred.h, pred.a, side);
    });
  });

  // Penalty winner selector — admin real scores
  document.querySelectorAll(".pen-actual-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.penActual;
      const side = btn.dataset.side;
      if (!state.koActuals[matchId]) state.koActuals[matchId] = {h:"",a:""};
      state.koActuals[matchId].pen = side;
      const actual = state.koActuals[matchId];
      saveKoActualWithPenAndReset(matchId, actual.h, actual.a, side);
    });
  });

  // Validate buttons — KO predictions
  document.querySelectorAll(".validate-ko-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateKo;
      const pred = (state.koPredictions?.[state.player]||{})[matchId] || {h:"",a:""};
      saveKoPrediction(matchId, pred.h, pred.a);
      flashBtn(btn);
    });
  });

  // Validate buttons — admin KO actual scores
  document.querySelectorAll(".validate-ko-actual-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateKoActual;
      const actual = state.koActuals[matchId] || {h:"",a:""};
      saveKoActualWithReset(matchId, actual.h, actual.a);
      flashBtn(btn);
    });
  });

  // Actual score inputs — save on blur only
  document.querySelectorAll(".score-input[data-actual]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "act_"+input.dataset.actual+input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.actual;
      const side = input.dataset.side;
      if (!state.actuals[matchId]) state.actuals[matchId] = {h:"",a:""};
      state.actuals[matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      const matchId = input.dataset.actual;
      const actual = state.actuals[matchId] || {h:"",a:""};
      saveActual(matchId, actual.h, actual.a);
      activeInputId = null;
      setTimeout(() => {
        if (document.activeElement?.tagName !== "INPUT" && renderPending) {
          renderPending = false; render();
        }
      }, 150);
    });
  });

  // KO prediction inputs
  const koTimers = {};
  document.querySelectorAll("input[data-ko]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "ko_"+input.dataset.ko+input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.ko;
      const side = input.dataset.side;
      if (!state.koPredictions) state.koPredictions = {};
      if (!state.koPredictions[state.player]) state.koPredictions[state.player] = {};
      if (!state.koPredictions[state.player][matchId]) state.koPredictions[state.player][matchId] = {h:"",a:""};
      state.koPredictions[state.player][matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.ko;
      const pred = (state.koPredictions?.[state.player]||{})[matchId] || {h:"",a:""};
      saveKoPrediction(matchId, pred.h, pred.a);
      activeInputId = null;
      setTimeout(() => { if(document.activeElement?.tagName!=="INPUT"&&renderPending){renderPending=false;render();} }, 150);
    });
  });

  // KO actual inputs
  document.querySelectorAll("input[data-ko-actual]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "koa_"+input.dataset.koActual+input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.koActual;
      const side = input.dataset.side;
      if (!state.koActuals[matchId]) state.koActuals[matchId] = {h:"",a:""};
      state.koActuals[matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.koActual;
      const actual = state.koActuals[matchId] || {h:"",a:""};
      saveKoActualWithReset(matchId, actual.h, actual.a);
      activeInputId = null;
      setTimeout(() => { if(document.activeElement?.tagName!=="INPUT"&&renderPending){renderPending=false;render();} }, 150);
    });
  });

  // Admin button
  document.getElementById("admin-btn")?.addEventListener("click", () => {
    state.showAdminModal = true; render();
  });

  // Admin modal
  document.getElementById("admin-overlay")?.addEventListener("click", e => {
    if (e.target.id==="admin-overlay") { state.showAdminModal = false; render(); }
  });
  document.getElementById("admin-close")?.addEventListener("click", () => {
    state.showAdminModal = false; render();
  });
  document.getElementById("admin-submit")?.addEventListener("click", () => {
    const pass = document.getElementById("admin-pass")?.value;
    if (pass === ADMIN_PASS) { state.isAdmin = true; state.showAdminModal = false; render(); }
    else { document.getElementById("admin-pass").value=""; document.getElementById("admin-pass").placeholder="❌ Incorrect"; }
  });
  document.getElementById("admin-pass")?.addEventListener("keydown", e => {
    if (e.key==="Enter") document.getElementById("admin-submit")?.click();
  });
  document.getElementById("admin-logout")?.addEventListener("click", () => {
    state.isAdmin = false; state.showAdminModal = false; render();
  });

  // Reset password
  document.querySelectorAll(".reset-pass-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.dataset.pid;
      const name = btn.dataset.name;
      const newPass = prompt(`Nouveau mot de passe pour ${name} :`);
      if (!newPass || !newPass.trim()) return;
      const hash = await hashPassword(newPass.trim());
      await dbUpdate(dbRef(db, `players/${pid}`), {hash});
      alert(`✓ Mot de passe de ${name} réinitialisé.`);
    });
  });

  // Rename player
  document.querySelectorAll(".rename-player-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.dataset.pid;
      const input = document.getElementById(`rename-${pid}`);
      const newName = input?.value.trim();
      if (!newName) { input?.focus(); return; }
      // Check duplicate
      const exists = Object.entries(state.players).find(([id, p]) => 
        id !== pid && p.name.toLowerCase() === newName.toLowerCase()
      );
      if (exists) { alert(`"${newName}" est déjà pris.`); return; }
      await dbUpdate(dbRef(db, `players/${pid}`), {name: newName});
      input.value = "";
      flashSave();
    });
  });

  // Delete player
  document.querySelectorAll(".delete-player-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.dataset.pid;
      const name = btn.dataset.name;
      if (!confirm(`Supprimer ${name} et tous ses pronostics ?`)) return;
      await deletePlayer(pid);
      flashSave();
    });
  });

  // Logout / switch player
  document.getElementById("logout-btn")?.addEventListener("click", () => {
    localStorage.removeItem("wc2026_player");
    localStorage.removeItem("wc2026_lang");
    state.player = null; state.lang = "fr"; state.showLoginModal = true; render();
    bindLoginModal();
  });
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
function boot() {
  // Check saved player
  const savedId = localStorage.getItem("wc2026_player");
  const savedLang = localStorage.getItem("wc2026_lang");
  if (savedId) {
    state.player = savedId;
    state.lang = savedLang || "fr";
    state.showLoginModal = false;
  }

  // Poll for Firebase ready (works with both sync and async module loading)
  const _fbWait = setInterval(() => {
    if (window.__firebaseReady) {
      clearInterval(_fbWait);
      initFirebase();
    }
  }, 50);

  // Timeout fallback if Firebase config not set
  setTimeout(() => {
    if (!window.__db) {
      document.getElementById("app").innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--text2);line-height:2">
          <div style="font-size:40px;margin-bottom:16px">🔧</div>
          <strong style="color:#fff;font-size:16px">Configuration Firebase manquante</strong><br>
          Ouvre le fichier <code>index.html</code> et remplace les valeurs<br>
          <code>REMPLACE_PAR_TON_*</code> par tes clés Firebase.
        </div>
      `;
    }
  }, 5000);
}

boot();


</script>
