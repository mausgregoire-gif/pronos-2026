    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111827;
      --bg2: #1e2d45;
      --bg3: #263354;
      --border: rgba(255,255,255,0.22);
      --border2: rgba(255,255,255,0.38);
      --gold: #f4c542;
      --gold2: #e8b820;
      --green: #00e5a0;
      --red: #ff5e5e;
      --yellow: #ffd166;
      --text: #ffffff;
      --text2: #c8d0e0;
      --text3: #8898b8;
      --radius: 14px;
      --radius-sm: 8px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 15% 0%, rgba(244,197,66,0.07) 0%, transparent 45%),

    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 4px; }

    /* ── LAYOUT ── */
    #app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    .header {

      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .header-left {}
    .header-label {

      text-transform: uppercase; margin-bottom: 6px;

    .header-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; }
    .header-sub { font-size: 12px; color: var(--text2); margin-top: 5px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 4px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 4px; margin: 0 0 20px;
      background: var(--bg2); border-radius: var(--radius);
      padding: 4px; border: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px 8px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px;
    }
    .tab.active { background: var(--gold); color: #080b10; }
    .tab:not(.active) { background: transparent; color: var(--text2); }
    .tab:not(.active):hover { color: var(--text); }

    /* ── PLAYER PILL ── */
    .player-section { margin-bottom: 18px; }
    .section-label { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
    .players-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .player-pill {
      padding: 8px 18px; border-radius: 30px; border: 1.5px solid;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .player-pill.active { border-color: var(--gold); background: rgba(244,197,66,0.12); color: var(--gold); }
    .player-pill:not(.active) { border-color: var(--border2); background: transparent; color: var(--text2); }
    .player-pill:not(.active):hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

    /* ── GROUP FILTER ── */
    .group-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .group-btn {
      padding: 6px 14px; border-radius: 20px; border: 1px solid;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .group-btn.active { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); color: #fff; }
    .group-btn:not(.active) { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: #c8d0e0; }

    /* ── INFO BAR ── */
    .info-bar {
      display: flex; gap: 20px; padding: 10px 14px; margin-bottom: 18px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm); font-size: 12px; color: var(--text2);
    }

    /* ── MATCH CARD ── */
    .match-card {
      background: #1e2d45; border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 8px; transition: border-color 0.2s;
    }
    .match-card.started { border-color: rgba(244,197,66,0.2); }
    .match-meta {
      display: flex; justify-content: space-between; align-items: center;

    }

    .match-venue { font-size: 10px; color: var(--text3); }
    .pts-badge {

    .pts-3 { color: var(--green); background: rgba(0,229,160,0.12); }
    .pts-1 { color: var(--yellow); background: rgba(255,209,102,0.12); }
    .pts-0 { color: var(--red); background: rgba(255,94,94,0.12); }
    .match-teams {

    }
    .team-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); }
    .team-name.away { text-align: right; }
    .team-flag { font-size: 20px; }
    .score-inputs { display: flex; align-items: center; gap: 6px; }
    .score-input {
      width: 44px; height: 44px; text-align: center;
      font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace;
      background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.3);
      border-radius: var(--radius-sm); color: #fff; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .score-input:focus { border-color: var(--gold); background: rgba(244,197,66,0.08); }
    .score-input:disabled { opacity: 0.35; cursor: not-allowed; }
    .score-sep { color: var(--text3); font-size: 16px; }
    .locked-badge {
      font-size: 10px; color: var(--gold); background: rgba(244,197,66,0.1);
      border: 1px solid rgba(244,197,66,0.2); border-radius: 12px;

    .lb-item {

    .lb-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text2); }
    .lb-total { font-size: 22px; font-weight: 800; font-family: 'DM Mono', monospace; min-width: 44px; text-align: right; }
    .lb-total.first { color: var(--gold); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px); display: flex;
      align-items: center; justify-content: center; z-index: 200; padding: 20px;
    }
    .modal {
      background: #141828; border: 1px solid var(--border2);
      border-radius: 20px; padding: 32px; width: 100%; max-width: 360px;
    }
    .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

    /* ── INPUTS ── */
    .input-field {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 1.5px solid var(--border2); background: rgba(255,255,255,0.05);
      color: #fff; font-size: 14px; font-family: 'DM Sans', sans-serif;
      outline: none; transition: border-color 0.15s; margin-bottom: 12px;
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-gold { background: var(--gold); color: #080b10; }
    .btn-ghost { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border2); }
    .btn-danger { background: rgba(255,94,94,0.1); color: var(--red); border: 1px solid rgba(255,94,94,0.25); }
    .btn + .btn { margin-top: 8px; }

    .admin-btn {

      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;

    .save-indicator { font-size: 11px; color: var(--green); letter-spacing: 1px; opacity: 0; transition: opacity 0.3s; }
    .save-indicator.visible { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

    /* ── LEGEND ── */
    .legend {

    /* ── LOADING ── */
    .loading { text-align: center; padding: 60px 20px; }
    .loading-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); margin: 0 3px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      .header-title { font-size: 22px; }
      .score-input { width: 40px; height: 40px; font-size: 16px; }
      .team-name { font-size: 12px; }
    }
  </style>
</head>

// KNOCKOUT ENGINE — basé sur les pronostics du joueur
// ══════════════════════════════════════════════════════════

const GROUPS_LIST = ["A","B","C","D","E","F","G","H","I","J","K","L"];

const GROUP_TEAMS = {
  A:["MEX","RSA","KOR","CZE"], B:["CAN","BIH","QAT","SUI"],
  C:["BRA","MAR","HAI","SCO"], D:["USA","PAR","AUS","TUR"],
  E:["GER","CUW","CIV","ECU"], F:["NED","JPN","SWE","TUN"],
  G:["BEL","EGY","IRN","NZL"], H:["ESP","CPV","KSA","URU"],
  I:["FRA","SEN","IRQ","NOR"], J:["ARG","AUT","ALG","JOR"],
  K:["POR","COD","COL","UZB"], L:["ENG","CRO","GHA","PAN"]
};

// Calcule le classement d'un groupe à partir d'un set de scores (pronostics ou réels)
function calcGroupStandings(group, scores) {
  const groupTeams = GROUP_TEAMS[group];
  const stats = {};
  groupTeams.forEach(t => stats[t] = {pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,played:0});

  MATCHES.filter(m => m.group === group).forEach(m => {
    const s = scores[m.id];
    if (!s || s.h === "" || s.a === "") return;
    const hg = parseInt(s.h), ag = parseInt(s.a);
    if (isNaN(hg) || isNaN(ag)) return;
    const ht = m.home, at = m.away;
    stats[ht].played++; stats[at].played++;
    stats[ht].gf+=hg; stats[ht].ga+=ag; stats[ht].gd+=hg-ag;
    stats[at].gf+=ag; stats[at].ga+=hg; stats[at].gd+=ag-hg;
    if(hg>ag){stats[ht].pts+=3;stats[ht].w++;stats[at].l++;}
    else if(hg<ag){stats[at].pts+=3;stats[at].w++;stats[ht].l++;}
    else{stats[ht].pts+=1;stats[ht].d++;stats[at].pts+=1;stats[at].d++;}
  });

  return groupTeams
    .map(t => ({team:t,...stats[t]}))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || b.w-a.w);
}

// Meilleurs 3èmes
function getBestThirds(scores) {
  return GROUPS_LIST
    .map(g => { const s=calcGroupStandings(g,scores); return s[2]?{...s[2],group:g}:null; })
    .filter(Boolean)
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || b.w-a.w)
    .slice(0,8);
}

// Construit le bracket R32 à partir des scores donnés (pronostics du joueur)
function buildR32fromScores(scores) {
  const get = (g, pos) => {
    const s = calcGroupStandings(g, scores);
    const allPlayed = MATCHES.filter(m=>m.group===g)
      .every(m => { const a=scores[m.id]; return a&&a.h!==""&&a.a!==""; });
    return allPlayed ? (s[pos]?.team || null) : null;
  };
  const t3 = getBestThirds(scores);
  const g3 = (i) => t3[i]?.team || null;

  return [
    {id:"R32_1",  home:get("A",0), away:get("B",1)},
    {id:"R32_2",  home:get("C",0), away:get("D",1)},
    {id:"R32_3",  home:get("E",0), away:get("F",1)},
    {id:"R32_4",  home:get("G",0), away:get("H",1)},
    {id:"R32_5",  home:get("I",0), away:get("J",1)},
    {id:"R32_6",  home:get("K",0), away:get("L",1)},
    {id:"R32_7",  home:get("B",0), away:get("A",1)},
    {id:"R32_8",  home:get("D",0), away:get("C",1)},
    {id:"R32_9",  home:get("F",0), away:get("E",1)},
    {id:"R32_10", home:get("H",0), away:get("G",1)},
    {id:"R32_11", home:get("J",0), away:get("I",1)},
    {id:"R32_12", home:get("L",0), away:get("K",1)},
    {id:"R32_13", home:g3(0), away:g3(1)},
    {id:"R32_14", home:g3(2), away:g3(3)},
    {id:"R32_15", home:g3(4), away:g3(5)},
    {id:"R32_16", home:g3(6), away:g3(7)},
  ];
}

// Avance le bracket : à partir des pronostics KO du joueur, déduit les équipes suivantes
function getKoWinner(matchId, koScores, r32) {
  const pred = koScores[matchId];
  if (!pred || pred.h === "" || pred.a === "") return null;
  const h = parseInt(pred.h), a = parseInt(pred.a);
  if (isNaN(h) || isNaN(a) || h === a) return null; // match nul → pas de vainqueur (KO = prolongations)
  const match = r32.find(m => m.id === matchId);
  if (!match) return null;
  return h > a ? match.home : match.away;
}

function buildFullBracket(playerGroupPreds, playerKoPreds) {
  // R32 basé sur pronostics de groupes du joueur
  const r32 = buildR32fromScores(playerGroupPreds);

  // R16 basé sur pronostics R32 du joueur
  const r16 = [
    {id:"R16_1", home: getKoWinner("R32_1",  playerKoPreds, r32), away: getKoWinner("R32_2",  playerKoPreds, r32)},
    {id:"R16_2", home: getKoWinner("R32_3",  playerKoPreds, r32), away: getKoWinner("R32_4",  playerKoPreds, r32)},
    {id:"R16_3", home: getKoWinner("R32_5",  playerKoPreds, r32), away: getKoWinner("R32_6",  playerKoPreds, r32)},
    {id:"R16_4", home: getKoWinner("R32_7",  playerKoPreds, r32), away: getKoWinner("R32_8",  playerKoPreds, r32)},
    {id:"R16_5", home: getKoWinner("R32_9",  playerKoPreds, r32), away: getKoWinner("R32_10", playerKoPreds, r32)},
    {id:"R16_6", home: getKoWinner("R32_11", playerKoPreds, r32), away: getKoWinner("R32_12", playerKoPreds, r32)},
    {id:"R16_7", home: getKoWinner("R32_13", playerKoPreds, r32), away: getKoWinner("R32_14", playerKoPreds, r32)},
    {id:"R16_8", home: getKoWinner("R32_15", playerKoPreds, r32), away: getKoWinner("R32_16", playerKoPreds, r32)},
  ];

  // QF
  const qf = [
    {id:"QF_1", home: getKoWinner("R16_1", playerKoPreds, r16), away: getKoWinner("R16_2", playerKoPreds, r16)},
    {id:"QF_2", home: getKoWinner("R16_3", playerKoPreds, r16), away: getKoWinner("R16_4", playerKoPreds, r16)},
    {id:"QF_3", home: getKoWinner("R16_5", playerKoPreds, r16), away: getKoWinner("R16_6", playerKoPreds, r16)},
    {id:"QF_4", home: getKoWinner("R16_7", playerKoPreds, r16), away: getKoWinner("R16_8", playerKoPreds, r16)},
  ];

  // SF
  const sf = [
    {id:"SF_1", home: getKoWinner("QF_1", playerKoPreds, qf), away: getKoWinner("QF_2", playerKoPreds, qf)},
    {id:"SF_2", home: getKoWinner("QF_3", playerKoPreds, qf), away: getKoWinner("QF_4", playerKoPreds, qf)},
  ];

  // Finale
  const final = [
    {id:"F_1", home: getKoWinner("SF_1", playerKoPreds, sf), away: getKoWinner("SF_2", playerKoPreds, sf)},
  ];

  return { r32, r16, qf, sf, final };
}

function getResult(h, a) {
  if (h===""||a===""||h===null||a===null) return null;
  const hi=parseInt(h),ai=parseInt(a);
  if(isNaN(hi)||isNaN(ai)) return null;
  return hi>ai?"H":hi<ai?"A":"D";
}
function calcPoints(pred, actual) {
  if(!pred||!actual||pred.h===""||pred.a===""||actual.h===""||actual.a==="") return null;
  if(pred.h===undefined||actual.h===undefined) return null;
  const pr=getResult(pred.h,pred.a), ar=getResult(actual.h,actual.a);
  if(pr===null||ar===null) return null;
  if(String(pred.h)===String(actual.h)&&String(pred.a)===String(actual.a)) return 3;
  if(pr===ar) return 1;
  return 0;
}
function isStarted(match) {
  const now=new Date();
  const d=new Date(`${match.date}T${match.time}:00Z`);
  return now>=d;
}
function teamName(code, lang) {
  const t=TEAMS[code];
  if(!t) return code;
  return lang==="en" ? t.en : t.name;
}
function fmt(date) {
  return new Date(date+"T00:00:00Z").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",timeZone:"UTC"});
}
function fmtLocalTime(date, time) {
  return new Date(date+"T"+time+":00Z").toLocaleTimeString("fr-BE",{hour:"2-digit",minute:"2-digit",timeZone:"Europe/Brussels"});
}
function fmtLocalDate(date, time) {
  return new Date(date+"T"+time+":00Z").toLocaleDateString("fr-BE",{weekday:"long",day:"numeric",month:"long",timeZone:"Europe/Brussels"});
}

function initFirebase() {
  db = window.__db;
  dbRef = window.__dbRef;
  dbSet = window.__dbSet;
  dbGet = window.__dbGet;
  dbOnValue = window.__dbOnValue;
  dbUpdate = window.__dbUpdate;

  // Listen to all data
  dbOnValue(dbRef(db, "/"), snap => {
    const data = snap.val() || {};
    state.players = data.players || {};
    state.actuals = data.actuals || {};
    state.koPredictions = data.koPredictions || {};
    state.koActuals = data.koActuals || {};
    // Always load predictions — first load takes everything, subsequent only merge others
    const _incoming = data.predictions || {};
    const wasLoaded = state._predictionsLoaded;
    if (!state._predictionsLoaded) {
      state.predictions = _incoming;
      state._predictionsLoaded = true;
    } else if (state.tab !== "pronostics") {
      state.predictions = _incoming;
    } else {
      Object.keys(_incoming).forEach(pid => {
        if (pid !== state.player) state.predictions[pid] = _incoming[pid];
      });
    }
    // Always render on first load, then only on non-pronostics tabs
    if (!wasLoaded) {
      render();
    } else if (state.tab === "pronostics") {
      renderPending = true;
    } else {
      render();
    }
  });

  // Initial render after Firebase connected
  render();
}

async function savePrediction(matchId, h, a) {
  if (!state.player) return;
  const path = `predictions/${state.player}/${matchId}`;
  await dbUpdate(dbRef(db, path), {h, a});
  flashSave();
}

async function saveKoPrediction(matchId, h, a) {
  if (!state.player) return;
  await dbUpdate(dbRef(db, `koPredictions/${state.player}/${matchId}`), {h, a});
  flashSave();
}

async function saveKoActual(matchId, h, a) {
  await dbUpdate(dbRef(db, `koActuals/${matchId}`), {h, a});
  flashSave();
}

async function saveActual(matchId, h, a) {
  // Save the actual score
  await dbUpdate(dbRef(db, `actuals/${matchId}`), {h, a});

  // If it's a group match, check if qualifiers changed and reset affected KO slots
  const match = MATCHES.find(m => m.id === matchId);
  if (match) {
    await resetAffectedKOSlots();
  }
  flashSave();
}

async function saveKoActualWithReset(matchId, h, a) {
  await dbUpdate(dbRef(db, `koActuals/${matchId}`), {h, a});
  // Reset downstream KO predictions for all players
  await resetDownstreamKO(matchId);
  flashSave();
}

// Get the real R32 bracket from actual scores
function buildR32fromActuals() {
  return buildR32fromScores(state.actuals);
}

// Reset KO predictions for all players if their predicted teams differ from real teams
async function resetAffectedKOSlots() {
  const realR32 = buildR32fromActuals();
  const players = Object.keys(state.players);

  for (const playerId of players) {
    const playerGroupPreds = (state.predictions[playerId] || {});
    const playerR32 = buildR32fromScores(playerGroupPreds);
    const playerKoPreds = (state.koPredictions?.[playerId] || {});

    for (const realMatch of realR32) {
      const predMatch = playerR32.find(m => m.id === realMatch.id);
      if (!predMatch) continue;

      // If real teams differ from predicted teams for this slot
      const teamsChanged = realMatch.home !== predMatch.home || realMatch.away !== predMatch.away;
      if (teamsChanged && playerKoPreds[realMatch.id]) {
        // Erase this player's KO prediction for this slot
        await dbSet(dbRef(db, `koPredictions/${playerId}/${realMatch.id}`), null);
        // Also erase all downstream slots
        await resetDownstreamKOForPlayer(playerId, realMatch.id);
      }
    }
  }
}

};

async function resetDownstreamKO(matchId) {
  // Reset for all players
  const players = Object.keys(state.players);
  for (const playerId of players) {
    await resetDownstreamKOForPlayer(playerId, matchId);
  }
}

async function resetDownstreamKOForPlayer(playerId, matchId) {
  const next = KO_DOWNSTREAM[matchId];
  if (!next) return;
  await dbSet(dbRef(db, `koPredictions/${playerId}/${next}`), null);
  await resetDownstreamKOForPlayer(playerId, next);
}

// ── AUTH ─────────────────────────────────────────────────
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + "wc2026salt");
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function registerPlayer(name, password, lang) {
  const trimName = name.trim();
  if (!trimName || !password) return;
  // Check duplicate name
  const existing = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (existing) {
    state.loginError = lang === "en"
      ? `"${trimName}" is already taken. Choose another name or log in.`
      : `"${trimName}" est déjà pris. Choisis un autre prénom ou connecte-toi.`;
    render(); bindLoginModal(); return;
  }
  const hash = await hashPassword(password);
  const id = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  await dbSet(dbRef(db, `players/${id}`), {name: trimName, lang, hash});
  state.player = id;
  state.lang = lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function loginPlayer(name, password, lang) {
  const trimName = name.trim();
  const found = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (!found) {
    state.loginError = lang === "en" ? "Name not found. Check spelling or sign up." : "Prénom introuvable. Vérifie l'orthographe ou inscris-toi.";
    render(); bindLoginModal(); return;
  }
  const [id, p] = found;
  const hash = await hashPassword(password);
  if (hash !== p.hash) {
    state.loginError = lang === "en" ? "Wrong password." : "Mot de passe incorrect.";
    render(); bindLoginModal(); return;
  }
  state.player = id;
  state.lang = p.lang || lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", state.lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function deletePlayer(id) {
  await dbSet(dbRef(db, `players/${id}`), null);
  await dbSet(dbRef(db, `predictions/${id}`), null);
  render();
}

function bindLoginModal() {
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.lang = btn.dataset.lang; render(); bindLoginModal(); });
  });
  const nameInput = document.getElementById("login-name");
  const passInput = document.getElementById("login-password");
  const submit = document.getElementById("login-submit");

  const go = () => {
    const name = nameInput?.value.trim();
    const pass = passInput?.value;
    if (!name) { nameInput?.focus(); return; }
    if (!pass) { passInput?.focus(); return; }
    if (state.loginMode === "login") {
      loginPlayer(name, pass, state.lang);
    } else {
      registerPlayer(name, pass, state.lang);
    }
  };

  submit?.addEventListener("click", go);
  passInput?.addEventListener("keydown", e => { if (e.key==="Enter") go(); });
  nameInput?.addEventListener("keydown", e => { if (e.key==="Enter") passInput?.focus(); });
  nameInput?.focus();
}


function renderKoMatch(match, pred, L, isAdmin, koActual) {
  const home = match.home;
  const away = match.away;
  const homeTeam = home ? TEAMS[home] : null;
  const awayTeam = away ? TEAMS[away] : null;
  const tbd = "?";
  const homeName = homeTeam ? (L ? homeTeam.en : homeTeam.name) : tbd;
  const awayName = awayTeam ? (L ? awayTeam.en : awayTeam.name) : tbd;
  const homeFlag = homeTeam ? homeTeam.flag : "❓";
  const awayFlag = awayTeam ? awayTeam.flag : "❓";
  const canPredict = home && away;
  const hasActual = koActual && koActual.h !== "" && koActual.a !== "";
  const pts = isAdmin ? null : calcPoints(pred||{h:"",a:""}, koActual||{h:"",a:""});
  const ptsColor = pts===3?"var(--green)":pts===1?"var(--yellow)":pts===0?"var(--red)":"#666";

  const roundLabel = match.id.startsWith("R32")?"1/16":match.id.startsWith("R16")?"1/8":match.id.startsWith("QF")?"1/4":match.id.startsWith("SF")?"1/2":"Finale";

  return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:5px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <span style="font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase">${roundLabel} · ${match.id.replace(/[A-Z_]+/,"").replace("_","")}</span>
      ${pts!==null?`<span style="font-size:11px;font-weight:700;color:${ptsColor};background:${ptsColor}22;border-radius:20px;padding:2px 8px">${pts} pt${pts>1?"s":""}</span>`:""}
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:16px">${homeFlag}</span>
      <span style="flex:1;font-size:12px;font-weight:700;color:${home?"var(--text)":"var(--text3)"}">${homeName}</span>
      <input type="number" min="0" max="20" value="${pred?.h||""}" ${!canPredict?"disabled":""}
        data-ko="${match.id}" data-side="h"

function renderRound(matches, playerKoPreds, koActuals, L, isAdmin, title) {
  return `
    <div style="margin-bottom:20px">
      <div style="font-size:10px;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(244,197,66,0.2)">${title}</div>
      ${matches.map(m => {
        const pred = (playerKoPreds||{})[m.id] || {h:"",a:""};
        const koActual = (koActuals||{})[m.id] || {h:"",a:""};
        return renderKoMatch(m, pred, L, isAdmin, koActual);
      }).join("")}
    </div>`;
}

function renderKnockout(L) {
  const playerGroupPreds = (state.predictions[state.player] || {});
  const playerKoPreds = (state.koPredictions?.[state.player] || {});
  const koActuals = state.koActuals || {};

  const bracket = buildFullBracket(playerGroupPreds, playerKoPreds);
  const {r32, r16, qf, sf, final} = bracket;

  // Count how many group matches the player has predicted
  const predCount = MATCHES.filter(m => {
    const p = playerGroupPreds[m.id];
    return p && p.h !== "" && p.a !== "";
  }).length;

  const pct = Math.round(predCount / MATCHES.length * 100);

  return `
    <div style="margin-bottom:16px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text2)">
      💡 ${L
        ? "Your bracket is built from your own group stage predictions. The more you fill in, the more teams appear!"
        : "Ton tableau est construit à partir de tes pronostics de groupes. Plus tu remplis, plus les équipes apparaissent !"}
      <div style="margin-top:6px;background:rgba(255,255,255,0.06);border-radius:4px;height:4px;overflow:hidden">
        <div style="height:4px;width:${pct}%;background:var(--gold);border-radius:4px;transition:width 0.3s"></div>
      </div>
      <div style="margin-top:4px;font-size:11px;color:var(--text3)">${predCount} / ${MATCHES.length} ${L?"group matches predicted":"matchs de groupe pronostiqués"}</div>
    </div>

    ${renderRound(r32, playerKoPreds, koActuals, L, state.isAdmin, L?"Round of 32 — 1/16":"1/16 de finale")}
    ${renderRound(r16, playerKoPreds, koActuals, L, state.isAdmin, L?"Round of 16 — 1/8":"1/8 de finale")}
    ${renderRound(qf,  playerKoPreds, koActuals, L, state.isAdmin, L?"Quarter-finals":"1/4 de finale")}
    ${renderRound(sf,  playerKoPreds, koActuals, L, state.isAdmin, L?"Semi-finals":"Demi-finales")}
    ${renderRound(final, playerKoPreds, koActuals, L, state.isAdmin, L?"🏆 Final":"🏆 Finale")}
  `;
}

async function savePrediction(matchId, h, a) {
  if (!state.player) return;
  const path = `predictions/${state.player}/${matchId}`;
  await dbUpdate(dbRef(db, path), {h, a});
  flashSave();
}

async function saveKoPrediction(matchId, h, a) {
  if (!state.player) return;
  await dbUpdate(dbRef(db, `koPredictions/${state.player}/${matchId}`), {h, a});
  flashSave();
}

async function saveKoActual(matchId, h, a) {
  await dbUpdate(dbRef(db, `koActuals/${matchId}`), {h, a});
  flashSave();
}

async function saveActual(matchId, h, a) {
  // Save the actual score
  await dbUpdate(dbRef(db, `actuals/${matchId}`), {h, a});

  // If it's a group match, check if qualifiers changed and reset affected KO slots
  const match = MATCHES.find(m => m.id === matchId);
  if (match) {
    await resetAffectedKOSlots();
  }
  flashSave();
}



async function resetDownstreamKO(matchId) {
  // Reset for all players
  const players = Object.keys(state.players);
  for (const playerId of players) {
    await resetDownstreamKOForPlayer(playerId, matchId);
  }
}

async function resetDownstreamKOForPlayer(playerId, matchId) {
  const next = KO_DOWNSTREAM[matchId];
  if (!next) return;
  await dbSet(dbRef(db, `koPredictions/${playerId}/${next}`), null);
  await resetDownstreamKOForPlayer(playerId, next);
}

// ── AUTH ─────────────────────────────────────────────────
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + "wc2026salt");
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function registerPlayer(name, password, lang) {
  const trimName = name.trim();
  if (!trimName || !password) return;
  // Check duplicate name
  const existing = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (existing) {
    state.loginError = lang === "en"
      ? `"${trimName}" is already taken. Choose another name or log in.`
      : `"${trimName}" est déjà pris. Choisis un autre prénom ou connecte-toi.`;
    render(); bindLoginModal(); return;
  }
  const hash = await hashPassword(password);
  const id = "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
  await dbSet(dbRef(db, `players/${id}`), {name: trimName, lang, hash});
  state.player = id;
  state.lang = lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function loginPlayer(name, password, lang) {
  const trimName = name.trim();
  const found = Object.entries(state.players).find(([,p]) => p.name.toLowerCase() === trimName.toLowerCase());
  if (!found) {
    state.loginError = lang === "en" ? "Name not found. Check spelling or sign up." : "Prénom introuvable. Vérifie l'orthographe ou inscris-toi.";
    render(); bindLoginModal(); return;
  }
  const [id, p] = found;
  const hash = await hashPassword(password);
  if (hash !== p.hash) {
    state.loginError = lang === "en" ? "Wrong password." : "Mot de passe incorrect.";
    render(); bindLoginModal(); return;
  }
  state.player = id;
  state.lang = p.lang || lang;
  localStorage.setItem("wc2026_player", id);
  localStorage.setItem("wc2026_lang", state.lang);
  state.showLoginModal = false;
  state.loginError = "";
  render();
}

async function deletePlayer(id) {
  await dbSet(dbRef(db, `players/${id}`), null);
  await dbSet(dbRef(db, `predictions/${id}`), null);
  render();
}

function flashBtn(btn) {
  btn.textContent = "✓";
  btn.style.background = "rgba(0,229,160,0.3)";
  btn.style.color = "var(--green)";
  setTimeout(() => {
    btn.style.background = "rgba(244,197,66,0.15)";
    btn.style.color = "var(--gold)";
  }, 1000);
}

function flashSave() {
  state.saveIndicator = true;

}

function renderClassement(playerList, L) {

  return `

        <input class="input-field" id="login-name" placeholder="${L?"Your name":"Ton prénom"}" maxlength="24" autocomplete="username" />
        <input class="input-field" id="login-password" type="password" placeholder="${L?"Password":"Mot de passe"}" maxlength="64" autocomplete="${isLogin?'current-password':'new-password'}" />

        ${!isLogin ? `
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn btn-ghost lang-btn" data-lang="fr" style="flex:1;${state.lang==='fr'?'border-color:var(--gold);color:var(--gold)':''}">🇫🇷 Français</button>
          <button class="btn btn-ghost lang-btn" data-lang="en" style="flex:1;${state.lang==='en'?'border-color:var(--gold);color:var(--gold)':''}">🇬🇧 English</button>

        ${state.loginError ? `<div style="color:var(--red);font-size:12px;margin-bottom:10px;padding:8px 12px;background:rgba(255,94,94,0.1);border-radius:8px">${state.loginError}</div>` : ""}

}

function renderAdminModal(L) {
  const playerList = Object.entries(state.players);
  return `
    <div class="modal-overlay" id="admin-overlay">
      <div class="modal" style="max-width:420px;max-height:90vh;overflow-y:auto">
        <h2>${state.isAdmin ? "⚙ Admin" : (L?"Admin mode":"Mode administrateur")}</h2>

        ${!state.isAdmin ? `
          <p style="margin-bottom:16px">${L?"Enter the password to access admin.":"Entrez le mot de passe pour accéder à l'admin."}</p>
          <input class="input-field" type="password" id="admin-pass" placeholder="${L?"Password":"Mot de passe"}…" autofocus />
          <button class="btn btn-gold" id="admin-submit">${L?"Enter":"Entrer"}</button>
          <div style="font-size:11px;color:var(--text3);margin-top:10px;text-align:center">${L?"Hint: coupe + year":"Indice : coupe + année"}</div>
        ` : `
          <!-- Player management -->
          <div style="margin-bottom:16px">
            <div style="font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">${L?"Players":"Joueurs"} (${playerList.length})</div>
            ${playerList.map(([id, p]) => `
              <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
                <span style="flex:1;font-size:13px;font-weight:600;color:${id===state.player?"var(--gold)":"var(--text)"}">
                  ${p.name} ${id===state.player?"(toi)":""}
                </span>
                <span style="font-size:11px;color:var(--text3)">${p.lang||"fr"}</span>
                <input
                  id="rename-${id}"
                  placeholder="${L?"New name":"Nouveau prénom"}"
                  maxlength="24"
                  style="width:100px;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,0.06);color:#fff;font-size:12px;outline:none"
                />
                <button class="rename-player-btn" data-pid="${id}" style="padding:4px 8px;border-radius:6px;border:none;background:rgba(244,197,66,0.15);color:var(--gold);font-size:11px;cursor:pointer">✏️</button>
                ${id !== state.player ? `
                  <button class="delete-player-btn" data-pid="${id}" data-name="${p.name}" style="padding:4px 8px;border-radius:6px;border:none;background:rgba(255,94,94,0.15);color:var(--red);font-size:11px;cursor:pointer">🗑</button>
                ` : ""}
              </div>
            `).join("")}
          </div>
          <button class="btn btn-danger" id="admin-logout" style="margin-bottom:8px">${L?"Logout admin":"Déconnexion admin"}</button>
        `}
        <button class="btn btn-ghost" id="admin-close">${L?"Close":"Fermer"}</button>

  `;
}

// ══════════════════════════════════════════════════════════
// EVENT BINDING
// ══════════════════════════════════════════════════════════
function bindLoginModal() {
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.lang = btn.dataset.lang; render(); bindLoginModal(); });
  });
  const nameInput = document.getElementById("login-name");
  const passInput = document.getElementById("login-password");
  const submit = document.getElementById("login-submit");

  const go = () => {
    const name = nameInput?.value.trim();
    const pass = passInput?.value;
    if (!name) { nameInput?.focus(); return; }
    if (!pass) { passInput?.focus(); return; }
    if (state.loginMode === "login") {
      loginPlayer(name, pass, state.lang);
    } else {
      registerPlayer(name, pass, state.lang);
    }
  };

  submit?.addEventListener("click", go);
  passInput?.addEventListener("keydown", e => { if (e.key==="Enter") go(); });
  nameInput?.addEventListener("keydown", e => { if (e.key==="Enter") passInput?.focus(); });
  nameInput?.focus();
}


function bindEvents(groups, filteredMatches, playerList, L) {
  // Tabs — flush pending Firebase data on tab switch
  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      state.tab = btn.dataset.tab;
      renderPending = false;
      render();
    });
  });

  // Group filter
  document.querySelectorAll(".group-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.group = btn.dataset.group; render(); });
  });

  // Prediction inputs — only update local state, save on validate button
  const debounceTimers = {};
  document.querySelectorAll(".score-input[data-match]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = input.dataset.match + input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("blur", () => { activeInputId = null; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.match;
      const side = input.dataset.side;
      if (!state.predictions[state.player]) state.predictions[state.player] = {};
      if (!state.predictions[state.player][matchId]) state.predictions[state.player][matchId] = {h:"",a:""};
      state.predictions[state.player][matchId][side] = input.value;
    });
    // Also save on Enter key
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const matchId = input.dataset.match;
        const pred = (state.predictions[state.player]||{})[matchId] || {h:"",a:""};
        savePrediction(matchId, pred.h, pred.a);
        input.blur();
        // Flash the validate button
        const btn = document.querySelector(`[data-validate="${matchId}"]`);
        if (btn) { btn.textContent = "✓"; btn.style.background = "rgba(0,229,160,0.3)"; setTimeout(() => { btn.style.background = "rgba(244,197,66,0.15)"; }, 800); }
      }
    });
  });

  // Validate buttons — group match predictions
  document.querySelectorAll(".validate-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validate;
      const pred = (state.predictions[state.player]||{})[matchId] || {h:"",a:""};
      savePrediction(matchId, pred.h, pred.a);
      flashBtn(btn);
    });
  });

  // Validate buttons — admin actual scores (group matches)
  document.querySelectorAll(".validate-actual-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateActual;
      const actual = state.actuals[matchId] || {h:"",a:""};
      saveActual(matchId, actual.h, actual.a);
      flashBtn(btn);
    });
  });

  // Validate buttons — KO predictions
  document.querySelectorAll(".validate-ko-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateKo;
      const pred = (state.koPredictions?.[state.player]||{})[matchId] || {h:"",a:""};
      saveKoPrediction(matchId, pred.h, pred.a);
      flashBtn(btn);
    });
  });

  // Validate buttons — admin KO actual scores
  document.querySelectorAll(".validate-ko-actual-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.validateKoActual;
      const actual = state.koActuals[matchId] || {h:"",a:""};
      saveKoActualWithReset(matchId, actual.h, actual.a);
      flashBtn(btn);
    });
  });

  // Actual score inputs — save on blur only
  document.querySelectorAll(".score-input[data-actual]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "act_"+input.dataset.actual+input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.actual;
      const side = input.dataset.side;
      if (!state.actuals[matchId]) state.actuals[matchId] = {h:"",a:""};
      state.actuals[matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      const matchId = input.dataset.actual;
      const actual = state.actuals[matchId] || {h:"",a:""};
      saveActual(matchId, actual.h, actual.a);
      activeInputId = null;
      setTimeout(() => {
        if (document.activeElement?.tagName !== "INPUT" && renderPending) {
          renderPending = false; render();
        }
      }, 150);
    });
  });

  // KO prediction inputs
  const koTimers = {};
  document.querySelectorAll("input[data-ko]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "ko_"+input.dataset.ko+input.dataset.side; });
    input.addEventListener("input", () => {
      const matchId = input.dataset.ko;
      const side = input.dataset.side;
      if (!state.koPredictions) state.koPredictions = {};
      if (!state.koPredictions[state.player]) state.koPredictions[state.player] = {};
      if (!state.koPredictions[state.player][matchId]) state.koPredictions[state.player][matchId] = {h:"",a:""};
      state.koPredictions[state.player][matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      const matchId = input.dataset.ko;
      const pred = (state.koPredictions?.[state.player]||{})[matchId] || {h:"",a:""};
      saveKoPrediction(matchId, pred.h, pred.a);
      activeInputId = null;
      setTimeout(() => { if(document.activeElement?.tagName!=="INPUT"&&renderPending){renderPending=false;render();} }, 150);
    });
  });

  // KO actual inputs
  document.querySelectorAll("input[data-ko-actual]").forEach(input => {
    input.addEventListener("focus", () => { activeInputId = "koa_"+input.dataset.koActual+input.dataset.side; lastInteraction = Date.now(); });
    input.addEventListener("input", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.koActual;
      const side = input.dataset.side;
      if (!state.koActuals[matchId]) state.koActuals[matchId] = {h:"",a:""};
      state.koActuals[matchId][side] = input.value;
    });
    input.addEventListener("blur", () => {
      lastInteraction = Date.now();
      const matchId = input.dataset.koActual;
      const actual = state.koActuals[matchId] || {h:"",a:""};
      saveKoActualWithReset(matchId, actual.h, actual.a);
      activeInputId = null;
      setTimeout(() => { if(document.activeElement?.tagName!=="INPUT"&&renderPending){renderPending=false;render();} }, 150);
    });
  });

  // Admin button
  document.getElementById("admin-btn")?.addEventListener("click", () => {
    state.showAdminModal = true; render();
  });

  // Admin modal
  document.getElementById("admin-overlay")?.addEventListener("click", e => {
    if (e.target.id==="admin-overlay") { state.showAdminModal = false; render(); }
  });
  document.getElementById("admin-close")?.addEventListener("click", () => {
    state.showAdminModal = false; render();
  });
  document.getElementById("admin-submit")?.addEventListener("click", () => {
    const pass = document.getElementById("admin-pass")?.value;
    if (pass === ADMIN_PASS) { state.isAdmin = true; state.showAdminModal = false; render(); }
    else { document.getElementById("admin-pass").value=""; document.getElementById("admin-pass").placeholder="❌ Incorrect"; }
  });
  document.getElementById("admin-pass")?.addEventListener("keydown", e => {
    if (e.key==="Enter") document.getElementById("admin-submit")?.click();
  });
  document.getElementById("admin-logout")?.addEventListener("click", () => {
    state.isAdmin = false; state.showAdminModal = false; render();
  });

  // Rename player
  document.querySelectorAll(".rename-player-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.dataset.pid;
      const input = document.getElementById(`rename-${pid}`);
      const newName = input?.value.trim();
      if (!newName) { input?.focus(); return; }
      // Check duplicate
      const exists = Object.entries(state.players).find(([id, p]) => 
        id !== pid && p.name.toLowerCase() === newName.toLowerCase()
      );
      if (exists) { alert(`"${newName}" est déjà pris.`); return; }
      await dbUpdate(dbRef(db, `players/${pid}`), {name: newName});
      input.value = "";
      flashSave();
    });
  });

  // Delete player
  document.querySelectorAll(".delete-player-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const pid = btn.dataset.pid;
      const name = btn.dataset.name;
      if (!confirm(`Supprimer ${name} et tous ses pronostics ?`)) return;
      await deletePlayer(pid);
      flashSave();
    });
  });

  // Logout / switch player
  document.getElementById("logout-btn")?.addEventListener("click", () => {
    localStorage.removeItem("wc2026_player");
    localStorage.removeItem("wc2026_lang");
    state.player = null; state.lang = "fr"; state.showLoginModal = true; render();
    bindLoginModal();
  });
}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
function boot() {
  // Check saved player
  const savedId = localStorage.getItem("wc2026_player");
  const savedLang = localStorage.getItem("wc2026_lang");
  if (savedId) {
    state.player = savedId;
    state.lang = savedLang || "fr";
    state.showLoginModal = false;
  }

  // Poll for Firebase ready (works with both sync and async module loading)
  const _fbWait = setInterval(() => {
    if (window.__firebaseReady) {
      clearInterval(_fbWait);
      initFirebase();
    }
  }, 50);

  // Timeout fallback if Firebase config not set
  setTimeout(() => {
    if (!window.__db) {
      document.getElementById("app").innerHTML = `
        <div style="text-align:center;padding:60px 20px;color:var(--text2);line-height:2">
          <div style="font-size:40px;margin-bottom:16px">🔧</div>
          <strong style="color:#fff;font-size:16px">Configuration Firebase manquante</strong><br>
          Ouvre le fichier <code>index.html</code> et remplace les valeurs<br>
          <code>REMPLACE_PAR_TON_*</code> par tes clés Firebase.
        </div>
      `;
    }
  }, 5000);
}

boot();
